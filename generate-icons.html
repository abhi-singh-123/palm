<!DOCTYPE html>
<html>
<head><title>Generate PALM Icons</title></head>
<body>
<script>
function generateIcon(size) {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background — rounded rect on green
  const radius = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();
  ctx.fillStyle = "#2d6a4f";
  ctx.fill();

  // Palm tree emoji
  ctx.font = `${size * 0.62}px serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🌴", size / 2, size / 2 + size * 0.04);

  // Download
  const a = document.createElement("a");
  a.download = `icon${size}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
}

window.onload = () => {
  [16, 48, 128].forEach((size, i) => {
    setTimeout(() => generateIcon(size), i * 300);
  });
};
</script>
<p>Generating icons... check your Downloads folder.</p>
</body>
</html>
