<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PALM — Personal AI Link Manager</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🌴</div>
      <div class="sidebar-logo-text">PALM</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filter by Tag</div>
      <div id="tagList">
        <button class="tag-filter active" data-tag="all">All Links <span id="totalCount" class="count">0</span></button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Group by</div>
      <div class="group-options">
        <button class="group-btn active" data-group="none">None</button>
        <button class="group-btn" data-group="tag">Tag</button>
        <button class="group-btn" data-group="date">Date</button>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button id="exportBtn" class="btn-secondary">⬇ Export</button>
      <div id="exportMenu" class="export-menu hidden">
        <button data-format="json">Export as JSON</button>
        <button data-format="csv">Export as CSV</button>
      </div>
      <button id="importBtn" class="btn-secondary">⬆ Import</button>
      <input type="file" id="importFile" accept=".csv" style="display:none" />
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Top bar -->
    <div class="topbar">
      <input type="text" id="searchInput" placeholder="Search links, summaries, tags..." />
      <span id="resultCount" class="result-count"></span>
    </div>

    <!-- Links grid -->
    <div id="linksGrid"></div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🌴</div>
      <h2>No links saved yet</h2>
      <p>Save your first link in 3 steps:</p>
      <div class="onboarding-steps">
        <div class="onboarding-step"><span class="step-num">1</span> Click the 🌴 PALM icon in your Chrome toolbar</div>
        <div class="onboarding-step"><span class="step-num">2</span> Add your free Gemini API key under ⚙️ Settings</div>
        <div class="onboarding-step"><span class="step-num">3</span> Click <strong>+ Save Page</strong> on any webpage</div>
      </div>
    </div>

  </main>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <button id="modalClose" class="modal-close">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
